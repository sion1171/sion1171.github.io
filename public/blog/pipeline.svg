<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 820" fill="none">
  <style>
    text { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c4c4c0" />
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#bbb8b0" />
    </marker>
  </defs>

  <rect width="700" height="820" fill="#ffffff" rx="10" />

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d2d">RAG Classification Pipeline</text>
  <text x="350" y="58" text-anchor="middle" font-size="12" fill="#888">Raw trade description  →  Standardized product category</text>

  <!-- ========== STAGE 0: Raw Input ========== -->
  <rect x="170" y="90" width="360" height="80" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <circle cx="198" cy="114" r="12" fill="#999" />
  <text x="198" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">0</text>
  <text x="218" y="118" font-size="13" font-weight="600" fill="#2d2d2d">Raw Input</text>
  <text x="198" y="140" font-size="11" fill="#777" font-family="'SF Mono', 'Fira Code', monospace">"FRZ BNLS BUFFALO MEAT NCK 20KG"</text>
  <text x="198" y="158" font-size="10" fill="#aaa">Messy, abbreviated, multilingual</text>

  <!-- Arrow -->
  <line x1="350" y1="170" x2="350" y2="200" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== STAGE 1: Normalize ========== -->
  <rect x="170" y="208" width="360" height="80" rx="8" fill="#f2f8f2" stroke="#b8ddb8" stroke-width="1.2" />
  <circle cx="198" cy="232" r="12" fill="#4caf50" />
  <text x="198" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="218" y="236" font-size="13" font-weight="600" fill="#2d2d2d">Normalize</text>
  <text x="198" y="256" font-size="11" fill="#666">LLM cleans raw description into structured text</text>
  <text x="198" y="276" font-size="11" fill="#4caf50" font-family="'SF Mono', 'Fira Code', monospace">"Frozen Boneless Buffalo Meat Neck"</text>

  <!-- Arrow -->
  <line x1="350" y1="288" x2="350" y2="318" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== STAGE 2: Embed ========== -->
  <rect x="170" y="326" width="360" height="80" rx="8" fill="#f0f0f8" stroke="#b8b8dd" stroke-width="1.2" />
  <circle cx="198" cy="350" r="12" fill="#5c6bc0" />
  <text x="198" y="354" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="218" y="354" font-size="13" font-weight="600" fill="#2d2d2d">Embed</text>
  <text x="198" y="374" font-size="11" fill="#666">text-embedding-3-large → 512-dim vector</text>
  <text x="198" y="394" font-size="11" fill="#5c6bc0" font-family="'SF Mono', 'Fira Code', monospace">[0.024, -0.183, 0.456, ...]</text>

  <!-- Arrow -->
  <line x1="350" y1="406" x2="350" y2="436" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== STAGE 3: Retrieve ========== -->
  <rect x="170" y="444" width="360" height="80" rx="8" fill="#fdf7ef" stroke="#e8d5a8" stroke-width="1.2" />
  <circle cx="198" cy="468" r="12" fill="#ff9800" />
  <text x="198" y="472" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="218" y="472" font-size="13" font-weight="600" fill="#2d2d2d">Retrieve</text>
  <text x="198" y="492" font-size="11" fill="#666">pgvector cosine similarity → top 12 candidates</text>
  <text x="198" y="512" font-size="11" fill="#ff9800" font-family="'SF Mono', 'Fira Code', monospace">raw-beef: 0.89  raw-pork: 0.73  ...</text>

  <!-- Arrow -->
  <line x1="350" y1="524" x2="350" y2="554" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== STAGE 4: Classify ========== -->
  <rect x="170" y="562" width="360" height="88" rx="8" fill="#fdf0f0" stroke="#e8b8b8" stroke-width="1.2" />
  <circle cx="198" cy="586" r="12" fill="#e53935" />
  <text x="198" y="590" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="218" y="590" font-size="13" font-weight="600" fill="#2d2d2d">Classify (Depth 1)</text>
  <text x="198" y="612" font-size="11" fill="#666">LLM picks best category + domain rules applied</text>
  <text x="198" y="638" font-size="12" fill="#e53935" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">→ raw-beef</text>

  <!-- Dashed arrow from Domain Rules -->
  <line x1="155" y1="607" x2="170" y2="607" stroke="#bbb8b0" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-dash)" />

  <!-- Domain Rules box (left side) -->
  <rect x="16" y="556" width="132" height="100" rx="6" fill="#fafaf9" stroke="#e0dfdb" stroke-width="1" stroke-dasharray="5,3" />
  <text x="82" y="576" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Domain Rules</text>
  <text x="28" y="596" font-size="9" fill="#888">frozen = preservation</text>
  <text x="28" y="612" font-size="9" fill="#888">coffee bean = green</text>
  <text x="28" y="628" font-size="9" fill="#888">butter ≥ 80% milk fat</text>
  <text x="28" y="644" font-size="9" fill="#888">seed maize = planting</text>

  <!-- Arrow -->
  <line x1="350" y1="650" x2="350" y2="680" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== STAGE 5: Drill Down ========== -->
  <rect x="170" y="688" width="360" height="68" rx="8" fill="#f7f0fd" stroke="#d1b8e8" stroke-width="1.2" />
  <circle cx="198" cy="712" r="12" fill="#8e24aa" />
  <text x="198" y="716" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text>
  <text x="218" y="716" font-size="13" font-weight="600" fill="#2d2d2d">Hierarchical Drill-Down</text>
  <text x="198" y="738" font-size="11" fill="#666">Recursive sub-category selection until leaf</text>

  <!-- Arrow -->
  <line x1="350" y1="756" x2="350" y2="778" stroke="#c4c4c0" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- ========== OUTPUT ========== -->
  <rect x="170" y="784" width="360" height="26" rx="6" fill="#2d2d2d" />
  <text x="350" y="802" text-anchor="middle" font-size="12" font-weight="600" fill="#fff" font-family="'SF Mono', 'Fira Code', monospace">raw-beef → raw-beef-cut → raw-beef-cut-frozen</text>

  <!-- Cost label (right side) -->
  <rect x="552" y="444" width="130" height="56" rx="6" fill="#fafaf9" stroke="#e0dfdb" stroke-width="1" stroke-dasharray="5,3" />
  <text x="617" y="464" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Cost / classification</text>
  <text x="617" y="484" text-anchor="middle" font-size="13" font-weight="700" fill="#e53935">~$0.002</text>
  <text x="617" y="496" text-anchor="middle" font-size="9" fill="#aaa">99.7% cheaper than before</text>
</svg>
