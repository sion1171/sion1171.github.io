<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" fill="none">
  <style>
    text { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>

  <rect width="720" height="560" fill="#ffffff" rx="10" />

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d2d">Product Ontology</text>
  <text x="360" y="56" text-anchor="middle" font-size="12" fill="#888">Hierarchical classification with example categories</text>

  <!-- Depth labels -->
  <text x="30" y="112" font-size="11" font-weight="600" fill="#bbb">Depth 1</text>
  <text x="30" y="232" font-size="11" font-weight="600" fill="#bbb">Depth 2</text>
  <text x="30" y="352" font-size="11" font-weight="600" fill="#bbb">Depth 3</text>

  <!-- Depth guide lines -->
  <line x1="85" y1="108" x2="700" y2="108" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="85" y1="228" x2="700" y2="228" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="85" y1="348" x2="700" y2="348" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />

  <!-- =============== BEEF TREE (highlighted path) =============== -->

  <!-- Depth 1: raw-beef -->
  <rect x="95" y="86" width="145" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="167" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">raw-beef</text>
  <text x="167" y="124" text-anchor="middle" font-size="10" fill="#999">Unprocessed beef</text>

  <!-- Lines from raw-beef to depth 2 -->
  <path d="M167,132 L167,155 L120,155 L120,206" stroke="#e53935" stroke-width="2" fill="none" />
  <path d="M167,132 L167,155 L218,155 L218,206" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 2: raw-beef-cut (highlighted) -->
  <rect x="47" y="206" width="145" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="119" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">raw-beef-cut</text>
  <text x="119" y="244" text-anchor="middle" font-size="10" fill="#999">Specific cuts</text>

  <!-- Depth 2: raw-beef-ground -->
  <rect x="205" y="206" width="145" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="277" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#555">raw-beef-ground</text>
  <text x="277" y="244" text-anchor="middle" font-size="10" fill="#999">Ground / minced</text>

  <!-- Lines from raw-beef-cut to depth 3 -->
  <path d="M119,252 L119,280 L82,280 L82,326" stroke="#e53935" stroke-width="2" fill="none" />
  <path d="M119,252 L119,280 L177,280 L177,326" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 3: raw-beef-cut-frozen (highlighted) -->
  <rect x="10" y="326" width="145" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="82" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">...-cut-frozen</text>
  <text x="82" y="364" text-anchor="middle" font-size="10" fill="#999">Frozen cuts</text>

  <!-- Depth 3: raw-beef-cut-chilled -->
  <rect x="168" y="326" width="145" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="240" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#555">...-cut-chilled</text>
  <text x="240" y="364" text-anchor="middle" font-size="10" fill="#999">Chilled cuts</text>

  <!-- =============== COFFEE TREE =============== -->

  <!-- Depth 1: green-coffee-bean -->
  <rect x="290" y="86" width="170" height="46" rx="8" fill="#f2f8f2" stroke="#b8ddb8" stroke-width="1.2" />
  <text x="375" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">green-coffee-bean</text>
  <text x="375" y="124" text-anchor="middle" font-size="10" fill="#999">Unroasted</text>

  <!-- Depth 1: roasted-coffee-bean -->
  <rect x="480" y="86" width="185" height="46" rx="8" fill="#fdf7ef" stroke="#e8d5a8" stroke-width="1.2" />
  <text x="572" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">roasted-coffee-bean</text>
  <text x="572" y="124" text-anchor="middle" font-size="10" fill="#999">Roasted</text>

  <!-- Lines from roasted-coffee-bean to depth 2 -->
  <path d="M572,132 L572,155 L510,155 L510,206" stroke="#ddd" stroke-width="1.5" fill="none" />
  <path d="M572,132 L572,155 L635,155 L635,206" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 2: whole-roasted -->
  <rect x="435" y="206" width="150" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="510" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#555">whole-roasted</text>
  <text x="510" y="244" text-anchor="middle" font-size="10" fill="#999">Whole beans</text>

  <!-- Depth 2: ground-coffee -->
  <rect x="600" y="206" width="110" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="655" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#555">ground</text>
  <text x="655" y="244" text-anchor="middle" font-size="10" fill="#999">Ground coffee</text>

  <!-- =============== EXAMPLE BOX (bottom) =============== -->
  <rect x="40" y="415" width="640" height="125" rx="10" fill="#fafaf9" stroke="#e0dfdb" stroke-width="1.2" />

  <text x="68" y="442" font-size="13" font-weight="700" fill="#e53935">Example Classification</text>

  <!-- Input -->
  <text x="68" y="468" font-size="12" font-weight="600" fill="#555">Input</text>
  <text x="130" y="468" font-size="12" fill="#777" font-family="'SF Mono', 'Fira Code', monospace">"FRZ BNLS BUFFALO MEAT NCK 20KG CTNS"</text>

  <!-- Step flow -->
  <rect x="68" y="484" width="80" height="22" rx="4" fill="#4caf50" />
  <text x="108" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Normalize</text>
  <text x="158" y="499" font-size="11" fill="#666">→</text>
  <text x="170" y="499" font-size="11" fill="#555" font-family="'SF Mono', 'Fira Code', monospace">"Frozen Boneless Buffalo Meat Neck"</text>

  <rect x="68" y="514" width="80" height="22" rx="4" fill="#ff9800" />
  <text x="108" y="529" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Retrieve</text>
  <text x="158" y="529" font-size="11" fill="#666">→</text>
  <text x="170" y="529" font-size="11" fill="#555" font-family="'SF Mono', 'Fira Code', monospace">raw-beef (0.89), raw-pork (0.73), ...</text>

  <rect x="400" y="484" width="80" height="22" rx="4" fill="#e53935" />
  <text x="440" y="499" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Classify</text>
  <text x="490" y="499" font-size="11" fill="#666">→</text>
  <text x="502" y="499" font-size="12" font-weight="700" fill="#e53935">raw-beef</text>

  <rect x="400" y="514" width="80" height="22" rx="4" fill="#8e24aa" />
  <text x="440" y="529" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Drill Down</text>
  <text x="490" y="529" font-size="11" fill="#666">→</text>
  <text x="502" y="529" font-size="12" font-weight="700" fill="#8e24aa">raw-beef-cut-frozen</text>
</svg>
