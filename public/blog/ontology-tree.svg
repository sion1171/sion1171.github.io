<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" fill="none">
  <style>
    text { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
  </style>

  <rect width="780" height="580" fill="#ffffff" rx="10" />

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d2d">Product Ontology</text>
  <text x="390" y="56" text-anchor="middle" font-size="12" fill="#888">Hierarchical classification with example categories</text>

  <!-- Depth labels (left column, clear of nodes) -->
  <text x="40" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#bbb">Depth 1</text>
  <text x="40" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#bbb">Depth 2</text>
  <text x="40" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#bbb">Depth 3</text>

  <!-- Depth guide lines -->
  <line x1="75" y1="110" x2="760" y2="110" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="75" y1="240" x2="760" y2="240" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="75" y1="370" x2="760" y2="370" stroke="#f0efed" stroke-width="1" stroke-dasharray="5,5" />

  <!-- =============== BEEF TREE (highlighted path) =============== -->

  <!-- Depth 1: raw-beef -->
  <rect x="115" y="88" width="148" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="189" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">raw-beef</text>
  <text x="189" y="126" text-anchor="middle" font-size="10" fill="#999">Unprocessed beef</text>

  <!-- Lines from raw-beef to depth 2 -->
  <path d="M189,134 L189,165 L140,165 L140,218" stroke="#e53935" stroke-width="2" fill="none" />
  <path d="M189,134 L189,165 L250,165 L250,218" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 2: raw-beef-cut (highlighted) -->
  <rect x="85" y="218" width="115" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="142" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">raw-beef-cut</text>
  <text x="142" y="256" text-anchor="middle" font-size="10" fill="#999">Specific cuts</text>

  <!-- Depth 2: raw-beef-ground -->
  <rect x="215" y="218" width="145" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="287" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#555">raw-beef-ground</text>
  <text x="287" y="256" text-anchor="middle" font-size="10" fill="#999">Ground / minced</text>

  <!-- Lines from raw-beef-cut to depth 3 -->
  <path d="M142,264 L142,300 L105,300 L105,348" stroke="#e53935" stroke-width="2" fill="none" />
  <path d="M142,264 L142,300 L195,300 L195,348" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 3: raw-beef-cut-frozen (highlighted) -->
  <rect x="85" y="348" width="115" height="46" rx="8" fill="#fef0f0" stroke="#e53935" stroke-width="2" />
  <text x="142" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">...-cut-frozen</text>
  <text x="142" y="386" text-anchor="middle" font-size="10" fill="#999">Frozen cuts</text>

  <!-- Depth 3: raw-beef-cut-chilled -->
  <rect x="215" y="348" width="115" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="272" y="370" text-anchor="middle" font-size="12" font-weight="600" fill="#555">...-cut-chilled</text>
  <text x="272" y="386" text-anchor="middle" font-size="10" fill="#999">Chilled cuts</text>

  <!-- =============== COFFEE TREE =============== -->

  <!-- Depth 1: green-coffee-bean -->
  <rect x="330" y="88" width="170" height="46" rx="8" fill="#f2f8f2" stroke="#b8ddb8" stroke-width="1.2" />
  <text x="415" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">green-coffee-bean</text>
  <text x="415" y="126" text-anchor="middle" font-size="10" fill="#999">Unroasted</text>

  <!-- Depth 1: roasted-coffee-bean -->
  <rect x="540" y="88" width="185" height="46" rx="8" fill="#fdf7ef" stroke="#e8d5a8" stroke-width="1.2" />
  <text x="632" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#e65100">roasted-coffee-bean</text>
  <text x="632" y="126" text-anchor="middle" font-size="10" fill="#999">Roasted</text>

  <!-- Lines from roasted-coffee-bean to depth 2 -->
  <path d="M632,134 L632,165 L565,165 L565,218" stroke="#ddd" stroke-width="1.5" fill="none" />
  <path d="M632,134 L632,165 L695,165 L695,218" stroke="#ddd" stroke-width="1.5" fill="none" />

  <!-- Depth 2: whole-roasted -->
  <rect x="490" y="218" width="150" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="565" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#555">whole-roasted</text>
  <text x="565" y="256" text-anchor="middle" font-size="10" fill="#999">Whole beans</text>

  <!-- Depth 2: ground-coffee -->
  <rect x="655" y="218" width="110" height="46" rx="8" fill="#f5f5f4" stroke="#e0dfdb" stroke-width="1.2" />
  <text x="710" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#555">ground</text>
  <text x="710" y="256" text-anchor="middle" font-size="10" fill="#999">Ground coffee</text>

  <!-- =============== EXAMPLE BOX (bottom) =============== -->
  <rect x="40" y="430" width="700" height="130" rx="10" fill="#fafaf9" stroke="#e0dfdb" stroke-width="1.2" />

  <text x="68" y="458" font-size="13" font-weight="700" fill="#e53935">Example Classification</text>

  <!-- Input -->
  <text x="68" y="484" font-size="12" font-weight="600" fill="#555">Input</text>
  <text x="130" y="484" font-size="12" fill="#777" font-family="'SF Mono', 'Fira Code', monospace">"FRZ BNLS BUFFALO MEAT NCK 20KG CTNS"</text>

  <!-- Step flow -->
  <rect x="68" y="498" width="80" height="22" rx="4" fill="#4caf50" />
  <text x="108" y="513" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Normalize</text>
  <text x="158" y="513" font-size="11" fill="#666">→</text>
  <text x="172" y="513" font-size="11" fill="#555" font-family="'SF Mono', 'Fira Code', monospace">"Frozen Boneless Buffalo Meat Neck"</text>

  <rect x="68" y="528" width="80" height="22" rx="4" fill="#ff9800" />
  <text x="108" y="543" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Retrieve</text>
  <text x="158" y="543" font-size="11" fill="#666">→</text>
  <text x="172" y="543" font-size="11" fill="#555" font-family="'SF Mono', 'Fira Code', monospace">raw-beef (0.89), raw-pork (0.73), ...</text>

  <rect x="430" y="498" width="80" height="22" rx="4" fill="#e53935" />
  <text x="470" y="513" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Classify</text>
  <text x="520" y="513" font-size="11" fill="#666">→</text>
  <text x="534" y="513" font-size="12" font-weight="700" fill="#e53935">raw-beef</text>

  <rect x="430" y="528" width="80" height="22" rx="4" fill="#8e24aa" />
  <text x="470" y="543" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Drill Down</text>
  <text x="520" y="543" font-size="11" fill="#666">→</text>
  <text x="534" y="543" font-size="12" font-weight="700" fill="#8e24aa">raw-beef-cut-frozen</text>
</svg>
